name: Release mcpb

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build all packages
        run: npm run build

      - name: Pack mcpb
        working-directory: packages/mcpb
        run: npx mcpb pack . pionex-mcp.mcpb

      - name: Upload mcpb to release
        uses: softprops/action-gh-release@v2
        with:
          files: "packages/mcpb/*.mcpb"

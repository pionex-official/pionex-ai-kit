openapi: 3.1.0
info:
  title: "Pionex Trading Bot Open API"
  version: "1.0.0"
  description: |
    Aggregated API overview for the Pionex AI Kit MCP server.
    Each iteration appends new paths and schemas to this file.

servers:
  - url: "https://api.pionex.com"
    description: "Production"

security:
  - PionexAuth: []

paths:
  # ──────────────────────────────────────────────
  # Account
  # ──────────────────────────────────────────────
  /api/v1/account/balances:
    get:
      summary: "Query spot account balances"
      operationId: "getAccountBalances"
      tags: ["Account"]
      responses:
        "200":
          description: "Success"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponseBase"
                  - type: object
                    properties:
                      data:
                        type: object
                        description: "Spot account balances keyed by currency"

  /api/v1/wallet/balancesFull:
    get:
      summary: "Query full account balance overview"
      operationId: "getBalancesFull"
      tags: ["Account"]
      description: |
        Returns spot (Bot Account) and futures (Trader Account) balances in a single call,
        together with per-coin price information and USDT/BTC total valuations.

        Uses ArgsConvertor middleware — external param names and response keys are camelCase.

        Auth note: handler builds gRPC metadata with `authorizationtype = "multiple_openapi"`
        (distinct from GetUserTokenCtx) so WalletService can identify open-api source requests.
      parameters:
        - name: appLang
          in: query
          required: false
          schema:
            type: string
            description: "App language (takes priority over sysLang), e.g. 'en' or 'zh'"
        - name: sysLang
          in: query
          required: false
          schema:
            type: string
            description: "System language fallback when appLang is absent"
      responses:
        "200":
          description: "Success"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponseBase"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/FetchBalancesFullResponse"
              examples:
                success:
                  summary: "Normal response"
                  value:
                    result: true
                    timestamp: 1714000000000
                    data:
                      prices:
                        BTC:
                          priceInUsd: "67000.00"
                          priceInBtc: "1"
                          change24hInUsd: "1200.00"
                          change24hInBtc: "0"
                          fullName: "Bitcoin"
                        ETH:
                          priceInUsd: "3200.00"
                          priceInBtc: "0.04776"
                          change24hInUsd: "50.00"
                          change24hInBtc: "-0.00012"
                          fullName: "Ethereum"
                      totalInUsdt: "12345.67"
                      totalInBtc: "0.18426"
                      botAccount:
                        totalInUsdt: "8000.00"
                        detail:
                          - type: "spot"
                            title: "Spot"
                            totalInUsdt: "5000.00"
                            list: []
                            hasMore: false
                            count: 3
                      traderAccount:
                        totalInUsdt: "4345.67"
                        title: "Futures"
                        detail: []
        "401":
          description: "Auth failed (TokenAuthenticate middleware)"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FailResponse"
              examples:
                invalidToken:
                  value:
                    result: false
                    timestamp: 1714000000000
                    code: "BOT_INVALID_TOKEN"
                    message: "invalid token"
        "500":
          description: "Downstream gRPC call failed"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FailResponse"
              examples:
                rpcError:
                  value:
                    result: false
                    timestamp: 1714000000000
                    code: "BOT_INTERNAL_ERROR"
                    message: "internal error"

components:
  securitySchemes:
    PionexAuth:
      type: apiKey
      in: header
      name: PIONEX-KEY
      description: |
        Pionex API key. Requests also require PIONEX-SIGNATURE (HMAC-SHA256) and
        PIONEX-TIMESTAMP headers. See PionexRestClient for the signing algorithm.

  schemas:
    SuccessResponseBase:
      type: object
      properties:
        result:
          type: boolean
          const: true
        timestamp:
          type: integer
          format: int64
          description: "Unix millisecond timestamp"

    FailResponse:
      type: object
      properties:
        result:
          type: boolean
          const: false
        timestamp:
          type: integer
          format: int64
        code:
          type: string
          enum:
            - BOT_INVALID_ARGUMENT
            - BOT_INVALID_TOKEN
            - BOT_INTERNAL_ERROR
        message:
          type: string

    FetchBalancesFullResponse:
      type: object
      description: "Full account balance overview (proto FetchBalancesFullResponse, camelCase via ArgsConvertor)"
      properties:
        prices:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/BalancePrice"
          description: "Per-coin price info, key = coin symbol (e.g. BTC, ETH)"
        totalInUsdt:
          type: string
          description: "USDT total across all accounts"
        totalInBtc:
          type: string
          description: "BTC total across all accounts"
        botAccount:
          $ref: "#/components/schemas/BotAccountBalanceDetail"
        traderAccount:
          $ref: "#/components/schemas/TraderAccountDetail"

    BalancePrice:
      type: object
      description: "Price info for a single coin"
      properties:
        priceInUsd:
          type: string
          description: "USD price"
        priceInBtc:
          type: string
          description: "BTC price"
        change24hInUsd:
          type: string
          description: "24 h USD change"
        change24hInBtc:
          type: string
          description: "24 h BTC change"
        fullName:
          type: string
          description: "Coin full name"

    BotAccountBalanceDetail:
      type: object
      description: "Bot (spot) account balance"
      properties:
        totalInUsdt:
          type: string
          description: "USDT total for Bot account"
        detail:
          type: array
          items:
            $ref: "#/components/schemas/BalanceDetail"
          description: "Category breakdown list"

    BalanceDetail:
      type: object
      description: "Balance category breakdown"
      properties:
        type:
          type: string
          description: "Category type identifier"
        title:
          type: string
          description: "Display title"
        totalInUsdt:
          type: string
          description: "USDT total for this category"
        list:
          type: array
          items:
            type: object
            description: "Balance entry (protobuf Any, structure depends on type)"
          description: "Balance entries"
        hasMore:
          type: boolean
          description: "Whether more entries exist"
        count:
          type: integer
          format: int64
          description: "Total entry count"

    TraderAccountDetail:
      type: object
      description: "Trader (futures) account balance"
      properties:
        totalInUsdt:
          type: string
          description: "USDT total for Trader account"
        title:
          type: string
          description: "Account display title"
        detail:
          type: array
          items:
            $ref: "#/components/schemas/FutureDetail"
          description: "Futures account category breakdown"

    FutureDetail:
      type: object
      description: "Futures account category breakdown"
      properties:
        type:
          type: string
          description: "Category type"
        title:
          type: string
          description: "Display title"
        totalInUsdt:
          type: string
          description: "USDT total for this category"
        riskState:
          type: string
          description: "Risk control state"
        balances:
          type: array
          items:
            type: object
            description: "FutureBalance (protobuf definition)"
          description: "Futures balance list"
        positions:
          type: array
          items:
            type: object
            description: "Position (protobuf definition)"
          description: "Position list"
        quoteRisks:
          type: array
          items:
            type: object
            description: "QuoteRisk (protobuf definition)"
          description: "Quote risk list"
